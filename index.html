<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Age Calculator</title>

  <style>

    body{
      font-family: Arial, sans-serif;
      background: #f2f2f2;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .container{
      background: white;
      width: 350px;
      padding: 30px;
      border-radius: 10px;
      text-align: center;
      box-shadow: 0 0 10px gray;
    }

    h1{
      margin-bottom: 20px;
    }

    input{
      width: 90%;
      padding: 10px;
      margin-top: 10px;
      font-size: 16px;
    }

    button{
      margin-top: 20px;
      padding: 10px 20px;
      font-size: 16px;
      background: blue;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }

    button:hover{
      background: darkblue;
    }

    #result{
      margin-top: 20px;
      font-size: 20px;
      font-weight: bold;
    }

  </style>
</head>

<body>

  <div class="container">

    <h1>Age Calculator</h1>

    <input type="date" id="dob">

    <br>

    <button onclick="calculateAge()">
      Calculate Age
    </button>

    <div id="result"></div>

  </div>

  <script>

    function calculateAge(){

      let dob =
      document.getElementById("dob").value;

      if(dob === ""){
        alert("Please select your date of birth");
        return;
      }

      let birthDate = new Date(dob);

      let today = new Date();

      let age =
      today.getFullYear() - birthDate.getFullYear();

      let monthDifference =
      today.getMonth() - birthDate.getMonth();

      if(
        monthDifference < 0 ||
        (monthDifference === 0 &&
        today.getDate() < birthDate.getDate())
      ){
        age--;
      }

      document.getElementById("result").innerHTML =
      "Your Age is " + age + " years";
    }

  </script>

</body>
</html>
