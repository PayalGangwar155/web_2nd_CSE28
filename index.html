<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>E-Commerce Product Page</title>

  <style>

    body{
      font-family: Arial, sans-serif;
      background: #f2f2f2;
      margin: 0;
      padding: 20px;
    }

    h1{
      text-align: center;
      margin-bottom: 30px;
    }

    .products{
      display: flex;
      justify-content: center;
      gap: 20px;
      flex-wrap: wrap;
    }

    .card{
      background: white;
      width: 250px;
      border-radius: 10px;
      box-shadow: 0 0 10px gray;
      overflow: hidden;
      text-align: center;
      padding-bottom: 15px;
    }

    .card img{
      width: 100%;
      height: 220px;
      object-fit: cover;
    }

    .card h2{
      margin: 10px 0;
    }

    .price{
      color: green;
      font-size: 20px;
      margin-bottom: 10px;
    }

    button{
      padding: 10px 15px;
      border: none;
      background: blue;
      color: white;
      border-radius: 5px;
      cursor: pointer;
    }

    button:hover{
      background: darkblue;
    }

    #cart{
      margin-top: 30px;
      text-align: center;
      font-size: 22px;
      font-weight: bold;
    }

  </style>
</head>

<body>

  <h1>E-Commerce Product Page</h1>

  <div class="products">

    <!-- Product 1 -->
    <div class="card">
      <img src="https://images.unsplash.com/photo-1542291026-7eec264c27ff?q=80&w=1000&auto=format&fit=crop" alt="Shoes">

      <h2>Sports Shoes</h2>

      <p class="price">₹1999</p>

      <button onclick="addToCart()">
        Add to Cart
      </button>
    </div>

    <!-- Product 2 -->
    <div class="card">
      <img src="https://images.unsplash.com/photo-1521572163474-6864f9cf17ab?q=80&w=1000&auto=format&fit=crop" alt="Tshirt">

      <h2>T-Shirt</h2>

      <p class="price">₹799</p>

      <button onclick="addToCart()">
        Add to Cart
      </button>
    </div>

    <!-- Product 3 -->
    <div class="card">
      <img src="https://images.unsplash.com/photo-1511707171634-5f897ff02aa9?q=80&w=1000&auto=format&fit=crop" alt="Phone">

      <h2>Smart Phone</h2>

      <p class="price">₹14999</p>

      <button onclick="addToCart()">
        Add to Cart
      </button>
    </div>

  </div>

  <div id="cart">
    Cart Items: 0
  </div>

  <script>

    let cartCount = 0;

    function addToCart(){

      cartCount++;

      document.getElementById("cart").innerText =
      "Cart Items: " + cartCount;
    }

  </script>

</body>
</html>
