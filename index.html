<!DOCTYPE html>
<html>
<head>
<title>Online Course page</title>
<style>
body{
    font-family: Arial;
    background:#f4f4f4;
    text-align:center;
}
header{
    background:#333;
    color:white;
    padding:15px;
}
.course{
    background:white;
    width:60%;
    margin:20px auto;
    padding:20px;
    border-radius:8px;
    box-shadow:0 0 10px gray;
}
button{
    background:green;
    color:white;
    padding:10px 15px;
    border:none;
    cursor:pointer;
}
button:hover{
    background:darkgreen;
}
iframe{
    width:100%;
    height:300px;
}
</style>
</head>

<body>

<header>
    <h1>Online Course page</h1>
</header>

<div class="course">
    <h2>HTML & CSS Course</h2>
    <p>Learn web development easily.</p>

    <iframe src="https://www.youtube.com/embed/qz0aGYrrlhU" allowfullscreen></iframe>
    <br><br>

    <button>Enroll Now</button>
</div>

</body>
</html>
