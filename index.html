<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Color Changer App</title>

  <style>
    body{
      font-family: Arial, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      transition: 0.5s;
    }

    .container{
      background: white;
      padding: 30px;
      border-radius: 10px;
      text-align: center;
      box-shadow: 0 0 10px gray;
    }

    h1{
      margin-bottom: 20px;
    }

    button{
      padding: 12px 20px;
      font-size: 16px;
      border: none;
      border-radius: 5px;
      background: blue;
      color: white;
      cursor: pointer;
    }

    button:hover{
      background: darkblue;
    }

    #colorCode{
      margin-top: 20px;
      font-size: 20px;
      font-weight: bold;
    }
  </style>
</head>

<body>

  <div class="container">
    <h1>Color Changer App</h1>

    <button onclick="changeColor()">
      Change Color
    </button>

    <p id="colorCode">Color Code</p>
  </div>

  <script>

    function changeColor(){

      const letters = "0123456789ABCDEF";

      let color = "#";

      for(let i = 0; i < 6; i++){
        color += letters[Math.floor(Math.random() * 16)];
      }

      document.body.style.backgroundColor = color;

      document.getElementById("colorCode").innerText =
      color;
    }

  </script>

</body>
</html>
