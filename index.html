<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Typing Speed Test</title>

  <style>

    body{
      font-family: Arial, sans-serif;
      background: #f2f2f2;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .container{
      background: white;
      width: 500px;
      padding: 25px;
      border-radius: 10px;
      box-shadow: 0 0 10px gray;
      text-align: center;
    }

    h1{
      margin-bottom: 20px;
    }

    #quote{
      font-size: 18px;
      margin-bottom: 20px;
      background: #eee;
      padding: 15px;
      border-radius: 5px;
    }

    textarea{
      width: 100%;
      height: 120px;
      padding: 10px;
      font-size: 16px;
      border-radius: 5px;
      border: 1px solid gray;
      resize: none;
    }

    button{
      margin-top: 15px;
      padding: 10px 20px;
      background: blue;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      font-size: 16px;
    }

    button:hover{
      background: darkblue;
    }

    .result{
      margin-top: 20px;
      font-size: 18px;
      font-weight: bold;
    }

  </style>
</head>

<body>

  <div class="container">

    <h1>Typing Speed Test</h1>

    <div id="quote">
      JavaScript is a powerful programming language used for web development.
    </div>

    <textarea
      id="input"
      placeholder="Start typing here..."
    ></textarea>

    <br>

    <button onclick="calculateSpeed()">
      Check Speed
    </button>

    <div class="result" id="result"></div>

  </div>

  <script>

    let startTime = new Date().getTime();

    function calculateSpeed(){

      let endTime = new Date().getTime();

      let totalTime = (endTime - startTime) / 1000;

      let typedText =
      document.getElementById("input").value;

      let wordCount =
      typedText.trim().split(" ").length;

      let speed =
      Math.round((wordCount / totalTime) * 60);

      document.getElementById("result").innerHTML =
      "Typing Speed: " + speed + " WPM";
    }

  </script>

</body>
</html>
