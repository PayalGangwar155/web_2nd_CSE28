<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Password Generator</title>

  <style>

    body{
      font-family: Arial;
      background: #f2f2f2;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .container{
      background: white;
      padding: 30px;
      border-radius: 10px;
      text-align: center;
      box-shadow: 0 0 10px gray;
      width: 350px;
    }

    input{
      width: 90%;
      padding: 10px;
      font-size: 18px;
      text-align: center;
    }

    button{
      margin-top: 15px;
      padding: 10px 20px;
      background: blue;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }

    button:hover{
      background: darkblue;
    }

  </style>
</head>

<body>

  <div class="container">

    <h1>Password Generator</h1>

    <input type="text" id="password" readonly>

    <br>

    <button onclick="generatePassword()">
      Generate Password
    </button>

  </div>

  <script>

    function generatePassword(){

      let chars =
      "ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789@#$";

      let password = "";

      for(let i = 0; i < 8; i++){

        password +=
        chars.charAt(Math.floor(Math.random() * chars.length));
      }

      document.getElementById("password").value =
      password;
    }

  </script>

</body>
</html>
