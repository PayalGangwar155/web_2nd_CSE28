<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BMI Calculator</title>

  <style>

    body{
      font-family: Arial;
      background: #f2f2f2;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .container{
      background: white;
      padding: 30px;
      border-radius: 10px;
      text-align: center;
      box-shadow: 0 0 10px gray;
      width: 350px;
    }

    input{
      width: 90%;
      padding: 10px;
      margin: 10px 0;
      font-size: 16px;
    }

    button{
      padding: 10px 20px;
      background: blue;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }

    button:hover{
      background: darkblue;
    }

    #result{
      margin-top: 20px;
      font-size: 20px;
      font-weight: bold;
    }

  </style>
</head>

<body>

  <div class="container">

    <h1>BMI Calculator</h1>

    <input
      type="number"
      id="weight"
      placeholder="Enter Weight (kg)"
    >

    <input
      type="number"
      id="height"
      placeholder="Enter Height (m)"
      step="0.01"
    >

    <button onclick="calculateBMI()">
      Calculate BMI
    </button>

    <div id="result"></div>

  </div>

  <script>

    function calculateBMI(){

      let weight =
      document.getElementById("weight").value;

      let height =
      document.getElementById("height").value;

      let bmi =
      (weight / (height * height)).toFixed(2);

      let status = "";

      if(bmi < 18.5){
        status = "Underweight";
      }

      else if(bmi < 25){
        status = "Normal Weight";
      }

      else if(bmi < 30){
        status = "Overweight";
      }

      else{
        status = "Obese";
      }

      document.getElementById("result").innerHTML =
      `
      BMI: ${bmi} <br>
      ${status}
      `;
    }

  </script>

</body>
</html>
