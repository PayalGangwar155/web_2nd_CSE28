<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>To-Do List</title>

  <style>
    body{
      font-family: Arial, sans-serif;
      background: #f2f2f2;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .container{
      background: white;
      padding: 25px;
      width: 350px;
      border-radius: 10px;
      box-shadow: 0 0 10px gray;
      text-align: center;
    }

    h2{
      margin-bottom: 20px;
    }

    input{
      width: 70%;
      padding: 10px;
    }

    button{
      padding: 10px 15px;
      background: blue;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }

    button:hover{
      background: darkblue;
    }

    ul{
      list-style: none;
      padding: 0;
      margin-top: 20px;
    }

    li{
      background: #eee;
      margin: 10px 0;
      padding: 10px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-radius: 5px;
    }

    .delete{
      background: red;
      padding: 5px 10px;
      border-radius: 5px;
    }

    .delete:hover{
      background: darkred;
    }
  </style>
</head>

<body>

  <div class="container">
    <h2>To-Do List</h2>

    <input type="text" id="taskInput" placeholder="Enter task">
    <button onclick="addTask()">Add</button>

    <ul id="taskList"></ul>
  </div>

  <script>
    function addTask(){

      let input = document.getElementById("taskInput");
      let task = input.value;

      if(task === ""){
        alert("Please enter a task");
        return;
      }

      let li = document.createElement("li");

      li.innerHTML = `
        ${task}
        <button class="delete" onclick="deleteTask(this)">X</button>
      `;

      document.getElementById("taskList").appendChild(li);

      input.value = "";
    }

    function deleteTask(button){
      button.parentElement.remove();
    }
  </script>

</body>
</html>
